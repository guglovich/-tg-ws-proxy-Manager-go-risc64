name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: test
        run: go test ./...

      - name: build local binary
        run: go build ./cmd/tg-ws-proxy

      - name: build openwrt binary
        run: |
          mkdir -p build
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt ./cmd/tg-ws-proxy
