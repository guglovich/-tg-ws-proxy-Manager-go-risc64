name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: run tests
        run: go test ./...

      - name: build openwrt binaries
        run: |
          mkdir -p build
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt-mipsel_24kc ./cmd/tg-ws-proxy
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o build/tg-ws-proxy-openwrt-aarch64 ./cmd/tg-ws-proxy
          cp build/tg-ws-proxy-openwrt-mipsel_24kc build/tg-ws-proxy-openwrt

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/tg-ws-proxy-openwrt-mipsel_24kc
            build/tg-ws-proxy-openwrt-aarch64
            build/tg-ws-proxy-openwrt
            tg-ws-proxy-go.sh
