name: Build tg-ws-proxy for OpenWRT riscv64

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-riscv64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: d0mhate/-tg-ws-proxy-Manager-go
          ref: ${{ github.event.inputs.version || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for riscv64
        env:
          GOOS: linux
          GOARCH: riscv64
          CGO_ENABLED: 0
        run: |
          go build -o tg-ws-proxy-openwrt-riscv64 .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: tg-ws-proxy-openwrt-riscv64
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
